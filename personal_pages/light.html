<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>light Dress</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f8f6f2;
    }

    .navbar {
      padding: 20px 60px;
      font-family: 'Playfair Display', serif;
      font-size: 22px;
    }

    .product-page {
      width: 90%;
      margin: 60px auto;
      display: flex;
      gap: 60px;
      align-items: center;
    }

    .product-image img {
      width: 500px;
      border-radius: 20px;
    }

    .product-details {
      max-width: 500px;
    }

    .product-details h1 {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      margin-bottom: 20px;
    }

    .price {
      font-size: 24px;
      margin-bottom: 20px;
      color: #c0392b;
    }

    .desc {
      color: #555;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    /* SIZE SECTION */
    .sizes {
      margin-bottom: 30px;
    }

    .size-buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .size-buttons button {
      padding: 10px 20px;
      border: 1px solid #000;
      background: #fff;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
    }

    .size-buttons button:hover {
      background: #000;
      color: #fff;
    }

    .buttons {
      display: flex;
      gap: 20px;
    }

    button {
      padding: 14px 30px;
      border-radius: 40px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
    }

    .cart {
      background: #fff;
      border: 1px solid #000;
    }

    .buy {
      background: #000;
      color: #fff;
    }

    .cart:hover {
      background: #000;
      color: #fff;
    }

    .buy:hover {
      transform: scale(1.05);
    }

    @media (max-width: 768px) {
      .product-page {
        flex-direction: column;
        text-align: center;
      }

      .product-image img {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">House of Vanshika</div>
  </nav>

  <section class="product-page">

    <div class="product-image">
      <img src="../images/light.png" alt="Red Dress">
    </div>

    <div class="product-details">
      <h1>light color Dress</h1>

      <!-- PRICE -->
      <p class="price" id="price">₹499</p>

      <p class="desc">
        A beautifully designed light color dress perfect for parties and special occasions.
        Made with premium fabric for comfort and style. This dress enhances your look
        with a modern yet classy touch.
      </p>

      <!-- SIZE OPTIONS -->
      <div class="sizes">
        <p>Select Size:</p>
        <div class="size-buttons">
          <button onclick="changePrice(499)">M</button>
          <button onclick="changePrice(599)">L</button>
          <button onclick="changePrice(699)">XL</button>
          <button onclick="changePrice(799)">XXL</button>
        </div>
      </div>

      <!-- BUTTONS -->
        <div class="buttons">
        <a href="../src/buynow.html">
        <button class="cart">Add to Cart</button>
        </a>
        <a href="../src/buynow.html">
        <button class="buy">Buy Now</button>
        </a>
      </div>

    </div>

  </section>

  <!-- JS -->
  <script>
    function changePrice(price) {
      document.getElementById("price").innerText = "₹" + price;
    }
  </script>

</body>
</html>
