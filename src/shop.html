<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - House of Vanshika</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">





  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #f8f6f2;
  font-family: 'Inter', sans-serif;
}

/* NAV */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 20px 60px;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
}

.nav-links {
  display: flex;
  gap: 30px;
  list-style: none;
}

.nav-links a {
  text-decoration: none;
  color: #333;
}

/* SHOP LAYOUT */
.shop {
  display: flex;
  width: 90%;
  margin: 40px auto;
  gap: 40px;
}

/* FILTER */
.filter {
  width: 200px;
}

.filter h3 {
  margin-bottom: 15px;
}

.filter button {
  display: block;
  margin-bottom: 10px;
  padding: 10px;
  width: 100%;
  border: none;
  cursor: pointer;
  background: #fff;
  border-radius: 8px;
}

/* PRODUCTS */
.products {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 25px;
}

/* CARD */
.card {
  background: #fff;
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
  cursor: pointer;
}
.card img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  object-position: top;
}

.card-content {
  padding: 15px;
}

.card-content h3 {
  font-size: 16px;
}

.price {
  margin-top: 5px;
  font-weight: 500;
}

/* HOVER */
.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* BUTTON */
.add-btn {
  margin-top: 10px;
  padding: 8px;
  width: 100%;
  border: none;
  background: black;
  color: white;
  border-radius: 20px;
  cursor: pointer;
}


/* FOOTER */
.footer {
  background: #111;
  color: #fff;
  padding: 60px 80px 20px;
  margin-top: 80px;
}

.footer-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 40px;
}

/* COLUMN */
.footer-col h2 {
  font-family: 'Playfair Display', serif;
  margin-bottom: 15px;
}

.footer-col h3 {
  margin-bottom: 15px;
  font-size: 16px;
}

.footer-col p {
  font-size: 14px;
  color: #bbb;
  line-height: 1.6;
}

/* LINKS */
.footer-col ul {
  list-style: none;
}

.footer-col ul li {
  margin-bottom: 10px;
}

.footer-col ul a {
  text-decoration: none;
  color: #bbb;
  font-size: 14px;
  transition: 0.3s;
}

.footer-col ul a:hover {
  color: #fff;
  padding-left: 5px;
}

/* NEWSLETTER */
.newsletter-box {
  display: flex;
  margin-top: 10px;
}

.newsletter-box input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
  border-radius: 5px 0 0 5px;
}

.newsletter-box button {
  padding: 10px 15px;
  border: none;
  background: #fff;
  cursor: pointer;
  border-radius: 0 5px 5px 0;
}

/* BOTTOM */
.footer-bottom {
  border-top: 1px solid #333;
  margin-top: 40px;
  padding-top: 20px;
  text-align: center;
  font-size: 13px;
  color: #aaa;
}

/* MOBILE */
@media (max-width: 768px) {
  .footer {
    padding: 40px 20px;
  }
}


  </style>
  
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">House of Vanshika</div>

    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="#">Shop</a></li>
      <li><a href="buynow.html">Cart</a></li>
    </ul>
  </nav>

  <!-- SHOP SECTION -->
  <section class="shop">

  

    <!-- PRODUCTS -->
    <div class="products" id="productContainer"></div>

  </section>






  <footer class="footer">
  <div class="footer-container">

    <!-- BRAND -->
    <div class="footer-col">
      <h2>House of Vanshika</h2>
      <p>Timeless fashion for modern elegance.  
      Designed to define your style.</p>
    </div>

    <!-- LINKS -->
    <div class="footer-col">
      <h3>Quick Links</h3>
      <ul>
        <li><a href="shop.html">Shop</a></li>
       
        <li><a href="about.html">About</a></li>
      </ul>
    </div>

 

    <!-- NEWSLETTER -->


  </div>

  <!-- BOTTOM -->
  <div class="footer-bottom">
    <p>© 2026 House of Vanshika. All rights reserved.</p>
  </div>
</footer>




  <script>
const products = [
  {
    name: "Elegant Red Dress",
    category: "Women",
    price: "₹499",
    image: "/images/red.png",
    link: "/personal_pages/red_dress.html"
  },
  {
    name: "Classic Black Dress",
    category: "Women",
    price: "₹499",
    image: "/images/black.png",
    link: "/personal_pages/black_dress.html"

  },
  {
    name: "Elegant gray Dress",
    category: "Women",
    price: "₹799",
    image: "/images/gray.png",
    link: "/personal_pages/gray.html"

  },
  {
    name: "light Color Dress",
    category: "Women",
    price: "₹499",
    image: "/images/light.png",
    link: "/personal_pages/light.html"

  }
];

const container = document.getElementById("productContainer");

products.forEach(product => {
  container.innerHTML += `
    <div class="card" onclick="goToProduct('${product.link}')">
      <img src="${product.image}" alt="${product.name}">
      <div class="card-content">
        <h3>${product.name}</h3>
        <p>${product.category}</p>
        <div class="price">${product.price}</div>
      </div>
    </div>
  `;
});

function goToProduct(link) {
  window.location.href = link;
}

  </script>
</body>
</html>
